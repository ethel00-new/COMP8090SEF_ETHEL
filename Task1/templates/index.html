<!DOCTYPE html>
<!-- Just UI all the frontend logic or call api in script.js-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" 
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" 
    crossorigin="anonymous" 
    referrerpolicy="no-referrer" 
  />
  <style>
    :root {
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-600: #4b5563;
      --gray-800: #1f2937;
    }
    body {
      background-color: var(--gray-100);
      color: var(--gray-800);
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
    }
    .btn-primary {
      background-color: var(--primary);
      color: white;
    }
    .btn-primary:hover {
      background-color: var(--primary-dark);
    }
    .strong { color: var(--success); font-weight: 600; }
    .weak, .repeat { color: var(--danger); font-weight: 600; }
    input:focus {
      outline: none;
      ring: 2px solid var(--primary);
      border-color: var(--primary);
    }

    .action-btn {
        font-size: 1.1rem;
        padding: 0.4rem 0.6rem;
        border-radius: 0.375rem;
        transition: all 0.15s ease;
        color: #3b82f6;
        background: rgba(59, 130, 246, 0.08);
        border: none;
        cursor: pointer;
    }

    .action-btn:hover {
        background: rgba(59, 130, 246, 0.18);
        color: #2563eb;
    }

    .action-btn.delete-btn {
        color: #ef4444;
        background: rgba(239, 68, 68, 0.08);
    }

    .action-btn.delete-btn:hover {
        background: rgba(239, 68, 68, 0.18);
    }

    .copy-cell {
        width: 60px;
        text-align: center;
    }

    .text-red-600 {
        color: #dc2626;
    }

  </style>
</head>
<body class="min-h-screen py-8 px-4 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-4xl font-bold text-center text-gray-800 mb-10">
      Password Notes
    </h1>

    <!-- Form Section -->
    <div class="card p-8 mb-10">
      <h2 id="form-title" class="text-2xl font-semibold mb-6 text-gray-800">Password Form</h2>
      
      <form id="password-form" class="space-y-6">
        <input type="hidden" id="edit-index" name="index" value="">

        <div>
          <label for="site" class="block text-sm font-medium text-gray-700 mb-1">Site / App</label>
          <input type="text" id="site" name="site" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:border-blue-500">
        </div>

        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="username" name="username" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:border-blue-500">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="max_length" class="block text-sm font-medium text-gray-700 mb-1">Max length</label>
             <!-- at least 5 character and default max is 16-->
            <input type="number" id="max_length" value="16" min="5"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:border-blue-500">
          </div>

          <div class="flex flex-col justify-end space-y-2">
            <label class="inline-flex items-center">
              <input type="checkbox" id="special" checked class="rounded text-blue-600 focus:ring-blue-500">
              <span class="ml-2 text-sm text-gray-700">Special characters</span>
            </label>
            <label class="inline-flex items-center">
              <input type="checkbox" id="first-letter" class="rounded text-blue-600 focus:ring-blue-500">
              <span class="ml-2 text-sm text-gray-700">First must be letter</span>
            </label>
            <label class="inline-flex items-center">
              <input type="checkbox" id="numbers-only" class="rounded text-blue-600 focus:ring-blue-500">
              <span class="ml-2 text-sm text-gray-700">Numbers only</span>
            </label>
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="flex gap-3">
            <input type="password" id="password" name="password"
                   class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:border-blue-500">
            <button type="button" id="generate-btn"
                    class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
              Generate
            </button>
          </div>
        </div>

        <div>
          <label for="expiry" class="block text-sm font-medium text-gray-700 mb-1">Expiry (YYYY-MM-DD)</label>
          <input type="date" id="expiry" name="expiry" required
                 class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:border-blue-500">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Attached file</label>
          <div class="flex items-center gap-3">
            <span id="file-name" class="text-gray-500 flex-1">No file selected</span>
            <input type="file" id="file" name="file" class="hidden">
            <button type="button" id="attach-btn"
                    class="px-5 py-2.5 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300">
              Attach
            </button>
            <button type="button" id="clear-file-btn"
                    class="px-5 py-2.5 bg-red-100 text-red-700 rounded-lg hover:bg-red-200">
              Clear
            </button>
          </div>
        </div>

        <div class="flex gap-4 pt-4">
          <button type="submit" id="save-btn"
                  class="flex-1 py-3 btn-primary rounded-lg font-medium text-lg">
            SAVE
          </button>
          <button type="button" id="cancel-edit" style="display:none;"
                  class="flex-1 py-3 bg-gray-300 text-gray-800 rounded-lg font-medium text-lg hover:bg-gray-400">
            Cancel
          </button>
        </div>
      </form>
    </div>

    <!-- List Section -->
    <div class="card p-8">
      <h2 class="text-2xl font-semibold mb-6 text-gray-800">Password List</h2>
      
      <div class="overflow-x-auto">
        <table id="password-table" class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Site</th>
              <th class="px-6 py-4"></th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Username</th>
              <th class="px-6 py-4"></th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Password</th>
              <th class="px-6 py-4"></th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Expiry</th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">File</th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Strong</th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Repeat</th>
              <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="table-body" class="bg-white divide-y divide-gray-200">
            <!-- <td> in JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
